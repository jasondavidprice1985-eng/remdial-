services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB:       ${POSTGRES_DB}
      POSTGRES_USER:     ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - remedial_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER}']
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      PORT: 3001
      NODE_ENV: production
      UPLOAD_DIR: /backend/uploads
    volumes:
      - remedial_uploads:/backend/uploads
    expose:
      - '3001'

  frontend-manager:
    build:
      context: .
      dockerfile: frontend-manager/Dockerfile
    restart: unless-stopped
    expose:
      - '80'

  frontend-office:
    build:
      context: .
      dockerfile: frontend-office/Dockerfile
    restart: unless-stopped
    expose:
      - '80'

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config

volumes:
  remedial_pgdata:
  remedial_uploads:
  caddy_data:
  caddy_config:
