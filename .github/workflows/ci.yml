name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            backend/package-lock.json
            frontend-manager/package-lock.json
            frontend-office/package-lock.json

      # -------- Backend --------
      - name: Install backend deps
        run: npm ci
        working-directory: ./backend

      - name: Type-check backend
        run: npx tsc --noEmit
        working-directory: ./backend

      - name: Backend unit tests
        run: npm test
        working-directory: ./backend

      - name: Build backend
        run: npm run build
        working-directory: ./backend

      # -------- Manager frontend --------
      - name: Install manager deps
        run: npm ci
        working-directory: ./frontend-manager

      - name: Manager unit tests
        run: npm test
        working-directory: ./frontend-manager

      - name: Build manager
        run: npm run build
        working-directory: ./frontend-manager

      # -------- Office frontend --------
      - name: Install office deps
        run: npm ci
        working-directory: ./frontend-office

      - name: Office unit tests
        run: npm test
        working-directory: ./frontend-office

      - name: Build office
        run: npm run build
        working-directory: ./frontend-office
