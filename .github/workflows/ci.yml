name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      VITE_API_URL: /api/v1
      VITE_SOCKET_URL: ''

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            backend/package-lock.json
            frontend-manager/package-lock.json
            frontend-office/package-lock.json

      # -------- Backend --------
      - name: Install backend deps
        run: npm ci
        working-directory: ./backend

      - name: Type-check backend
        run: npx tsc --noEmit
        working-directory: ./backend

      - name: Backend unit tests
        run: npm test
        working-directory: ./backend

      - name: Security audit (backend)
        run: npm audit --audit-level=high
        working-directory: ./backend
        continue-on-error: true

      - name: Build backend
        run: npm run build
        working-directory: ./backend

      # -------- Manager frontend --------
      - name: Install manager deps
        run: npm ci
        working-directory: ./frontend-manager

      - name: Manager unit tests
        run: npm test
        working-directory: ./frontend-manager

      - name: Build manager
        run: npm run build
        working-directory: ./frontend-manager

      # -------- Office frontend --------
      - name: Install office deps
        run: npm ci
        working-directory: ./frontend-office

      - name: Office unit tests
        run: npm test
        working-directory: ./frontend-office

      - name: Build office
        run: npm run build
        working-directory: ./frontend-office

  # E2E job disabled until tests are rewritten for individual-accounts auth.
  # Re-enable by removing the `if: false` line and updating env vars +
  # adding `cd ../e2e && npm ci` to the install step.
  e2e:
    if: false
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_HOST_AUTH_METHOD: trust
          POSTGRES_DB: remedial_test
        ports:
          - 5433:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install all deps
        run: |
          cd backend && npm ci
          cd ../frontend-manager && npm ci
          cd ../frontend-office && npm ci

      - name: Build backend
        run: npm run build
        working-directory: ./backend

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps
        working-directory: ./e2e

      - name: Run E2E tests
        run: npx playwright test
        working-directory: ./e2e
        env:
          DATABASE_URL: postgresql://postgres@localhost:5433/remedial_test
          JWT_SECRET: e2e-test-secret-key-at-least-32-characters-long
          MANAGER_USERNAME: manager
          MANAGER_PASSWORD: manager
          OFFICE_USERNAME: office
          OFFICE_PASSWORD: office
          MANAGER_URL: http://localhost:5174
          OFFICE_URL: http://localhost:5175
